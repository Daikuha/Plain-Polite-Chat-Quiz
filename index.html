<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plain vs Polite Chat Quiz</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas (画像ダウンロード用) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background-color: #e2e8f0; touch-action: manipulation; }
        .slide-in-left { animation: slideInLeft 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // クイズのデータ（ひらがな・カタカナのみ、全20問に増量）
        const QUIZ_DATA = [
            { character: "teacher", name: "たなかせんせい", avatar: "👩‍🏫", theme: "blue", question: "きのう、にほんごを べんきょうしましたか？", userPrefix: "はい、", options: ["べんきょうしました", "べんきょうした", "べんきょうします", "べんきょうして"], correctIndex: 0, desc: "Teacher -> Polite. Past affirmative -> べんきょうしました." },
            { character: "friend", name: "ケン", avatar: "👦", theme: "orange", question: "しゅうまつ、えいがを みる？", userPrefix: "ううん、", options: ["みない", "みません", "みなかった", "みないです"], correctIndex: 0, desc: "Friend -> Plain. Present negative -> みない." },
            { character: "teacher", name: "やまだせんせい", avatar: "👨‍🏫", theme: "blue", question: "にほんの たべものは、おいしいですか？", userPrefix: "はい、とても", options: ["おいしいだ", "おいしかったです", "おいしい", "おいしいです"], correctIndex: 3, desc: "Teacher -> Polite. i-Adjective present affirmative -> おいしいです." },
            { character: "friend", name: "ユイ", avatar: "👩", theme: "orange", question: "きのうの テスト、むずかしかった？", userPrefix: "うん、すごく", options: ["むずかしかったです", "むずかしい", "むずかした", "むずかしかった"], correctIndex: 3, desc: "Friend -> Plain. i-Adjective past affirmative -> むずかしかった." },
            { character: "teacher", name: "たなかせんせい", avatar: "👩‍🏫", theme: "blue", question: "あの レストランは しずかですか？", userPrefix: "いいえ、", options: ["しずかじゃない", "しずかじゃありません", "しずかではありませんでした", "しずかくないです"], correctIndex: 1, desc: "Teacher -> Polite. na-Adjective present negative -> しずかじゃありません." },
            { character: "friend", name: "ケン", avatar: "👦", theme: "orange", question: "あたらしい せんせい、しんせつ？", userPrefix: "うん、とても", options: ["しんせつだよ", "しんせつです", "しんせつな", "しんせつだねです"], correctIndex: 0, desc: "Friend -> Plain. na-Adjective present affirmative -> しんせつだ(よ)." },
            { character: "teacher", name: "やまだせんせい", avatar: "👨‍🏫", theme: "blue", question: "あしたは やすみですか？", userPrefix: "はい、", options: ["やすみだ", "やすむです", "やすみでした", "やすみです"], correctIndex: 3, desc: "Teacher -> Polite. Noun present affirmative -> やすみです." },
            { character: "friend", name: "ユイ", avatar: "👩", theme: "orange", question: "きのう、あめだった？", userPrefix: "ううん、", options: ["あめじゃありませんでした", "あめじゃない", "あめだった", "あめじゃなかった"], correctIndex: 3, desc: "Friend -> Plain. Noun past negative -> あめじゃなかった." },
            { character: "teacher", name: "たなかせんせい", avatar: "👩‍🏫", theme: "blue", question: "しゅうまつは、どこかへ いきましたか？", userPrefix: "いいえ、どこへも", options: ["いかなかった", "いきません", "いってない", "いきませんでした"], correctIndex: 3, desc: "Teacher -> Polite. Verb past negative -> いきませんでした." },
            { character: "friend", name: "ケン", avatar: "👦", theme: "orange", question: "こんばん、いっしょに ばんごはん たべない？", userPrefix: "うん、", options: ["たべる！", "たべます！", "たべた！", "たべない！"], correctIndex: 0, desc: "Friend -> Plain. Agreeing to an invitation -> たべる！" },
            { character: "friend", name: "ユイ", avatar: "👩", theme: "orange", question: "あした、ひま？", userPrefix: "うん、", options: ["ひまだよ", "ひまです", "ひまじゃない", "ひまな"], correctIndex: 0, desc: "Friend -> Plain. na-Adjective present -> ひまだ(よ)." },
            { character: "teacher", name: "やまだせんせい", avatar: "👨‍🏫", theme: "blue", question: "けさ、あさごはんを たべましたか？", userPrefix: "いいえ、", options: ["たべません", "たべなかったです", "たべませんでした", "たべないです"], correctIndex: 2, desc: "Teacher -> Polite. Verb past negative -> たべませんでした." },
            { character: "friend", name: "ケン", avatar: "👦", theme: "orange", question: "その ケーキ、おいしい？", userPrefix: "うん、", options: ["おいしいだ", "おいしいよ", "おいしいです", "おいしかった"], correctIndex: 1, desc: "Friend -> Plain. i-Adjective present -> おいしい(よ)." },
            { character: "teacher", name: "たなかせんせい", avatar: "👩‍🏫", theme: "blue", question: "せんしゅうの りょこうは たのしかったですか？", userPrefix: "はい、とても", options: ["たのしいでした", "たのしかった", "たのしかったです", "たのしかったでした"], correctIndex: 2, desc: "Teacher -> Polite. i-Adjective past -> たのしかったです." },
            { character: "friend", name: "ユイ", avatar: "👩", theme: "orange", question: "きのう、どこかへ いった？", userPrefix: "ううん、どこへも", options: ["いかなかった", "いかない", "いきませんでした", "いってない"], correctIndex: 0, desc: "Friend -> Plain. Verb past negative -> いかなかった." },
            { character: "teacher", name: "やまだせんせい", avatar: "👨‍🏫", theme: "blue", question: "ここは ゆうめいですか？", userPrefix: "はい、とても", options: ["ゆうめいです", "ゆうめいだ", "ゆうめいな", "ゆうめいじゃないね"], correctIndex: 0, desc: "Teacher -> Polite. na-Adjective present -> ゆうめいです." },
            { character: "friend", name: "ケン", avatar: "👦", theme: "orange", question: "くるま、もっている？", userPrefix: "ううん、", options: ["もっていない", "もっていません", "もってないです", "もたない"], correctIndex: 0, desc: "Friend -> Plain. Verb present negative -> もっていない." },
            { character: "teacher", name: "たなかせんせい", avatar: "👩‍🏫", theme: "blue", question: "これから かえりますか？", userPrefix: "はい、", options: ["かえります", "かえる", "かえりますよ", "かえって"], correctIndex: 0, desc: "Teacher -> Polite. Verb present -> かえります." },
            { character: "friend", name: "ユイ", avatar: "👩", theme: "orange", question: "あの ひと、だれ？", userPrefix: "ああ、わたしの", options: ["ともだちです", "ともだちじゃないです", "ともだちだよ", "ともだちな"], correctIndex: 2, desc: "Friend -> Plain. Noun present -> ともだちだ(よ)." },
            { character: "teacher", name: "やまだせんせい", avatar: "👨‍🏫", theme: "blue", question: "パーティーに きますか？", userPrefix: "いいえ、", options: ["こない", "きません", "きないです", "きませんでした"], correctIndex: 1, desc: "Teacher -> Polite. Verb present negative -> きません." }
        ];

        // 配列シャッフル関数
        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        const App = () => {
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [gameState, setGameState] = useState("loading"); // loading, playing, answered, finished
            const [selectedOption, setSelectedOption] = useState(null);
            const [score, setScore] = useState(0);
            
            // 合格証用のステートとRef
            const [playerName, setPlayerName] = useState("");
            const [isGeneratingImg, setIsGeneratingImg] = useState(false);
            const certificateRef = useRef(null);
            
            const QUESTIONS_PER_GAME = 10; // 1回のゲームでの出題数

            useEffect(() => {
                // 全問題からシャッフルして10問だけ抽出
                setQuestions(shuffleArray(QUIZ_DATA).slice(0, QUESTIONS_PER_GAME));
                setGameState("playing");
            }, []);

            const currentQ = questions[currentIndex];

            const handleSelect = (index) => {
                if (gameState !== "playing") return;
                
                setSelectedOption(index);
                if (index === currentQ.correctIndex) {
                    setScore(prev => prev + 1);
                    playAudio('correct');
                } else {
                    playAudio('wrong');
                }
                setGameState("answered");
            };

            const handleNext = () => {
                if (currentIndex < questions.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                    setSelectedOption(null);
                    setGameState("playing");
                } else {
                    setGameState("finished");
                }
            };

            const resetGame = () => {
                // もう一度遊ぶ時も新たにシャッフルして10問抽出
                setQuestions(shuffleArray(QUIZ_DATA).slice(0, QUESTIONS_PER_GAME));
                setCurrentIndex(0);
                setScore(0);
                setSelectedOption(null);
                setGameState("playing");
            };

            const downloadCertificate = async () => {
                if (!certificateRef.current || isGeneratingImg) return;
                setIsGeneratingImg(true);
                try {
                    const canvas = await window.html2canvas(certificateRef.current, {
                        scale: 2,
                        backgroundColor: "#ffffff",
                        logging: false
                    });
                    const image = canvas.toDataURL("image/png");
                    const safeName = playerName.trim() || "Guest";
                    const link = document.createElement("a");
                    link.download = `Polite_Plain_Master_${safeName}.png`;
                    link.href = image;
                    link.click();
                } catch (error) {
                    console.error("Image generation failed:", error);
                } finally {
                    setIsGeneratingImg(false);
                }
            };

            const playAudio = (type) => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    osc.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    
                    if (type === 'correct') {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(880, ctx.currentTime);
                        osc.frequency.setValueAtTime(1108.73, ctx.currentTime + 0.1);
                        gainNode.gain.setValueAtTime(0, ctx.currentTime);
                        gainNode.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.02);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.3);
                    } else {
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.2);
                        gainNode.gain.setValueAtTime(0, ctx.currentTime);
                        gainNode.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.02);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                        osc.start(ctx.currentTime);
                        osc.stop(ctx.currentTime + 0.2);
                    }
                } catch (e) {}
            };

            if (gameState === "loading" || !currentQ) return <div className="min-h-screen flex items-center justify-center">Loading...</div>;

            if (gameState === "finished") {
                const isPerfect = score === questions.length;
                
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4">
                        {isPerfect ? (
                            // 全問正解時の合格証UI
                            <div className="max-w-md w-full flex flex-col gap-4 slide-up">
                                <div ref={certificateRef} className="bg-white p-8 rounded-2xl shadow-xl text-center border-4 border-yellow-400 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-4 opacity-20 text-6xl">👑</div>
                                    
                                    <h2 className="text-xl font-bold text-gray-400 mb-2 uppercase tracking-widest">Certificate of Mastery</h2>
                                    <p className="text-3xl font-black text-blue-600 mb-6">Polite & Plain Style</p>
                                    
                                    <div className="mb-4 bg-gray-50 p-3 rounded-lg border border-gray-200">
                                        <label className="block text-xs font-bold text-gray-400 mb-1">Presented to</label>
                                        <input 
                                            type="text" 
                                            maxLength="15"
                                            placeholder="Your Name" 
                                            value={playerName}
                                            onChange={(e) => setPlayerName(e.target.value)}
                                            className="w-full text-center text-3xl font-black text-gray-800 bg-transparent border-none focus:outline-none focus:ring-0 placeholder-gray-300"
                                        />
                                    </div>

                                    <div className="my-4">
                                        <p className="text-5xl font-black text-yellow-500 mb-2">PERFECT SCORE</p>
                                        <p className="font-bold text-gray-600">{score} / {questions.length}</p>
                                    </div>
                                    
                                    <div className="text-xs text-gray-400 font-bold mt-4 pt-4 border-t border-gray-100">
                                        Generated by Plain vs Polite Chat Quiz
                                    </div>
                                </div>
                                
                                <button 
                                    onClick={downloadCertificate} 
                                    disabled={isGeneratingImg}
                                    className={`w-full text-white font-bold py-4 rounded-xl transition-colors shadow-[0_4px_0_0_rgba(29,78,216,1)] active:shadow-none active:translate-y-1 text-lg flex justify-center items-center gap-2
                                        ${isGeneratingImg ? 'bg-blue-400 cursor-not-allowed' : 'bg-blue-500 hover:bg-blue-600'}`}
                                >
                                    {isGeneratingImg ? "Generating..." : "Save Certificate as PNG"}
                                </button>
                                <button onClick={resetGame} className="w-full bg-gray-500 text-white font-bold py-4 rounded-xl hover:bg-gray-600 transition-colors shadow-[0_4px_0_0_rgba(75,85,99,1)] active:shadow-none active:translate-y-1 text-lg">
                                    Play Again
                                </button>
                            </div>
                        ) : (
                            // 満点以外の通常リザルトUI
                            <div className="bg-white p-8 rounded-2xl shadow-xl text-center max-w-md w-full pop-in">
                                <h2 className="text-3xl font-black text-gray-800 mb-4">Chat Complete!</h2>
                                <p className="text-6xl font-black text-blue-500 mb-2">{score} <span className="text-2xl text-gray-400">/ {questions.length}</span></p>
                                <p className="text-gray-600 font-bold mb-8">
                                    {score >= questions.length * 0.7 ? "Great job! Keep it up! 👍" : "Nice try! Let's practice more! 💪"}
                                    <br/><span className="text-sm text-red-500 mt-2 block">Get a perfect score to earn a certificate!</span>
                                </p>
                                <button onClick={resetGame} className="w-full bg-blue-500 text-white font-bold py-4 rounded-xl hover:bg-blue-600 transition-colors shadow-[0_4px_0_0_rgba(29,78,216,1)] active:shadow-none active:translate-y-1 text-lg">
                                    Try Again
                                </button>
                            </div>
                        )}
                    </div>
                );
            }

            const isCorrect = selectedOption === currentQ.correctIndex;

            return (
                <div className="min-h-screen max-w-lg mx-auto bg-slate-100 flex flex-col relative overflow-hidden shadow-2xl md:my-4 md:rounded-3xl md:h-[90vh]">
                    
                    {/* Header */}
                    <header className="bg-white shadow-sm p-4 flex items-center justify-between z-10">
                        <div className="flex items-center gap-2">
                            <span className="text-2xl">{currentQ.avatar}</span>
                            <span className="font-bold text-gray-800">{currentQ.name}</span>
                        </div>
                        <div className="bg-gray-200 text-gray-600 font-bold px-3 py-1 rounded-full text-sm">
                            {currentIndex + 1} / {questions.length}
                        </div>
                    </header>

                    {/* Chat Area */}
                    <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-6">
                        
                        {/* Opponent's Message */}
                        <div className="flex items-start gap-3 slide-in-left">
                            <div className="text-4xl">{currentQ.avatar}</div>
                            <div className="flex flex-col">
                                <span className="text-xs text-gray-500 ml-1 mb-1 font-bold">{currentQ.name}</span>
                                <div className={`px-5 py-3 rounded-2xl rounded-tl-none shadow-sm text-lg font-bold
                                    ${currentQ.theme === 'blue' ? 'bg-blue-100 text-blue-900' : 'bg-orange-100 text-orange-900'}`}>
                                    {currentQ.question}
                                </div>
                            </div>
                        </div>

                        {/* User's Message */}
                        <div className="flex items-end justify-end gap-3 slide-in-right mt-4">
                            <div className="flex flex-col items-end">
                                <span className="text-xs text-gray-500 mr-1 mb-1 font-bold">You</span>
                                <div className="bg-green-500 text-white px-5 py-3 rounded-2xl rounded-tr-none shadow-sm text-lg font-bold flex items-center gap-2">
                                    {currentQ.userPrefix}
                                    {gameState === "playing" ? (
                                        <span className="inline-block border-b-2 border-white w-16 blink-cursor"></span>
                                    ) : (
                                        <span className={`px-2 py-1 rounded bg-white font-black
                                            ${isCorrect ? 'text-green-600' : 'text-red-500 line-through'}`}>
                                            {currentQ.options[selectedOption]}
                                        </span>
                                    )}
                                </div>
                                
                                {/* If wrong, show the correct answer right below */}
                                {gameState === "answered" && !isCorrect && (
                                    <div className="mt-2 bg-white px-4 py-2 rounded-xl rounded-tr-none shadow text-green-600 font-black border-2 border-green-500 pop-in">
                                        Correction: {currentQ.options[currentQ.correctIndex]}
                                    </div>
                                )}
                            </div>
                            <div className="text-4xl">👤</div>
                        </div>

                    </div>

                    {/* Action / Choices Area */}
                    <div className="bg-white p-4 rounded-t-3xl shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-10 min-h-[250px] flex flex-col justify-center">
                        {gameState === "playing" ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 pop-in">
                                {currentQ.options.map((opt, idx) => (
                                    <button 
                                        key={idx}
                                        onClick={() => handleSelect(idx)}
                                        className="bg-gray-50 hover:bg-green-50 text-gray-800 font-bold p-4 rounded-xl border-2 border-gray-200 hover:border-green-400 transition-colors shadow-sm text-lg active:scale-95"
                                    >
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        ) : (
                            <div className="pop-in flex flex-col h-full justify-between">
                                <div className={`p-4 rounded-xl mb-4 border-2 ${isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                    <h3 className={`font-black text-xl mb-1 ${isCorrect ? 'text-green-600' : 'text-red-600'}`}>
                                        {isCorrect ? '✅ Correct!' : '❌ Oops!'}
                                    </h3>
                                    <p className="text-gray-700 text-sm font-bold">{currentQ.desc}</p>
                                </div>
                                <button 
                                    onClick={handleNext}
                                    className="w-full bg-gray-800 text-white font-bold py-4 rounded-xl text-lg hover:bg-gray-700 transition-colors shadow-[0_4px_0_0_rgba(0,0,0,0.8)] active:shadow-none active:translate-y-1"
                                >
                                    Next Message
                                </button>
                            </div>
                        )}
                    </div>
                    
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .blink-cursor {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</body>
</html>
